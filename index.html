<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Corey Hommel | Portfolio</title>
    <link rel="icon" type="image/png" href="tabicon.png">
    <style>
        /* CSS Styles */
        * {
            box-sizing: border-box;
        }
        body {
            margin: 0;
            padding: 0;
            height: 100vh; 
            height: 100dvh; 
            overflow: hidden; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            background-color: #fafafa;
            color: #333;
        }
        
        header {
            padding: 30px 40px;
            flex-shrink: 0; 
        }
        .logo {
            height: 70px; 
            width: auto;
        }

        main {
            flex-grow: 1; 
            display: flex;
            gap: 20px;
            padding: 0 40px;
            align-items: center; 
            justify-content: center; 
        }
        
        .card {
            flex: 1; 
            height: 65vh; 
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            border-radius: 8px;
            overflow: hidden;
            background-color: #5c1b40; 
            background-size: cover;
            background-position: center;
            transition: transform 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        
        .card:hover {
            transform: translateY(-5px);
        }

        .card-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.4);
            transition: background 0.3s ease;
        }
        .card:hover .card-overlay {
            background: rgba(0, 0, 0, 0.2); 
        }

        .card h2 {
            position: relative;
            color: white;
            font-size: 2.2rem;
            font-weight: 300;
            letter-spacing: 2px;
            text-align: center;
            margin: 0;
            padding: 20px;
            z-index: 2;
        }

        footer {
            padding: 20px 40px;
            flex-shrink: 0;
            background-color: #fafafa;
            border-top: 1px solid #eaeaea;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
            font-size: 0.9rem;
        }
        footer a {
            color: #5c1b40;
            text-decoration: none;
            font-weight: 600;
            transition: opacity 0.3s ease;
        }
        footer a:hover {
            opacity: 0.7;
        }
        footer span {
            color: #777;
        }

        @media (max-width: 768px) {
            header {
                padding: 15px; 
                text-align: center; 
            }
            .logo {
                height: 45px; 
            }
            main {
                flex-direction: column; 
                padding: 0 15px;
                gap: 12px; 
            }
            .card {
                width: 100%;
                height: 100%; 
                min-height: 0; 
            }
            .card h2 {
                font-size: 1.6rem; 
                padding: 10px;
            }
            footer {
                padding: 15px; 
                gap: 10px;
            }
        }
    </style>
</head>
<body>

    <header>
        <img src="logo.png" alt="Corey Hommel Logo" class="logo">
    </header>

    <main>
        <a href="academic.html" class="card" style="background-image: url('academicpreview.png');">
            <div class="card-overlay"></div>
            <h2>Academic Projects</h2>
        </a>
        
        <a href="professional.html" class="card" style="background-image: url('professionalpreview.png');">
            <div class="card-overlay"></div>
            <h2>Professional Projects</h2>
        </a>
        
        <a href="personal.html" class="card" style="background-image: url('personalpreview.png');">
            <div class="card-overlay"></div>
            <h2>Personal Projects</h2>
        </a>
    </main>

    <footer>
        <a href="mailto:contentedhappenings@gmail.com">contentedhappenings@gmail.com</a>
        <span>&bull;</span>
        <a href="https://www.linkedin.com/in/corey-hommel-3401ba80/" target="_blank" rel="noopener noreferrer">LinkedIn</a>
        <span>&bull;</span>
        <a href="resume.html">Resume</a>
    </footer>

</body>
</html>

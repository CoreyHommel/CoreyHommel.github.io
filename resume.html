<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume | Corey Hommel</title>
    <link rel="icon" type="image/png" href="tabicon.png">
    <style>
        /* CSS Styles */
        * {
            box-sizing: border-box;
        }
        body {
            margin: 0;
            padding: 0;
            padding-bottom: 70px; /* Leaves space for the fixed footer */
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #fafafa;
            color: #333;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        
        header {
            padding: 30px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #fafafa;
            border-bottom: 1px solid #eaeaea;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .logo {
            height: 70px; 
            width: auto;
        }
        .back-link {
            text-decoration: none;
            color: #5c1b40;
            font-weight: 600;
            font-size: 1rem;
            transition: opacity 0.3s ease;
        }
        .back-link:hover {
            opacity: 0.7;
        }

        main {
            flex-grow: 1;
            max-width: 1000px;
            margin: 0 auto;
            padding: 40px;
            width: 100%;
            display: flex;
            flex-direction: column;
        }

        .page-title {
            font-size: 2.5rem;
            font-weight: 300;
            color: #5c1b40;
            margin-bottom: 30px;
            border-bottom: 2px solid #eaeaea;
            padding-bottom: 10px;
        }

        iframe.resume-pdf {
            flex-grow: 1;
            width: 100%;
            height: 75vh;
            border: none;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        footer {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 15px 40px;
            background-color: #fafafa;
            border-top: 1px solid #eaeaea;
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
            font-size: 0.9rem;
        }
        footer a {
            color: #5c1b40;
            text-decoration: none;
            font-weight: 600;
            transition: opacity 0.3s ease;
        }
        footer a:hover {
            opacity: 0.7;
        }
        footer span {
            color: #777;
        }

        @media (max-width: 600px) {
            header {
                padding: 15px 20px;
            }
            main {
                padding: 20px;
            }
            footer {
                padding: 15px 20px;
                gap: 10px;
            }
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html">
            <img src="logo.png" alt="Corey Hommel Logo" class="logo">
        </a>
        <a href="index.html" class="back-link">← Back to Home</a>
    </header>

    <main>
        <h1 class="page-title">Resume</h1>
        <iframe class="resume-pdf" src="CoreyHommelResume.pdf" title="Corey Hommel Resume"></iframe>
    </main>

    <footer>
        <a href="mailto:contentedhappenings@gmail.com">contentedhappenings@gmail.com</a>
        <span>&bull;</span>
        <a href="https://www.linkedin.com/in/corey-hommel-3401ba80/" target="_blank" rel="noopener noreferrer">LinkedIn</a>
        <span>&bull;</span>
        <a href="resume.html">Resume</a>
    </footer>

</body>
</html>
